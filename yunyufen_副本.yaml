    use:
      - 渔舍
      - 极风
    filter: "(?i)美国|us|usa|american|united ?states|🇺🇸"
    url: https://connect.rom.miui.com/generate_204
    interval: 60
    timeout: 2000
    lazy: false
    hidden: true
    icon: "https://cdn.jsdelivr.net/gh/yanjinbin/dotfiles@latest/mihomo/rules/icons/battery.png"

  - name: 🔌 🇯🇵
    type: fallback
    use:
      - 渔舍
      - 极风
    filter: "(?i)日本|jp|japan|🇯🇵"
    url: https://connect.rom.miui.com/generate_204
    interval: 60
    timeout: 2000
    lazy: false
    hidden: true
    icon: "https://cdn.jsdelivr.net/gh/yanjinbin/dotfiles@latest/mihomo/rules/icons/battery.png"


