dns:
  enable: true
  ipv6: false
  listen: :23453
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # 国内 DNS 优先
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # 国外 DoH fallback
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
      - geolocation-!cn
    ipcidr:
      - 240.0.0.0/4
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localdomain'
    - '*.internal'
    # STUN / WebRTC
    - '+.stun.*.*'
    - 'stun.*.*'
    # Tailscale
    - '*.ts.net'
    - '*.tailscale.com'
    - '*.tailscale.io'
    - '100.100.100.100'
    # NTP
    - 'time.*.com'
    - 'time.*.gov'
    - '*.ntp.org'
    - 'pool.ntp.org'

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080]
      override-destination: true
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    # 米家 / IoT，避免设备连接被错误改写
    - 'Mijia Cloud'
    - '+.mi.com'
    - '+.xiaomi.com'
    - '+.mijia.com'
    # Apple 推送 / iCloud / App Store
    - '+.push.apple.com'
    - '+.apple.com'
    - '+.icloud.com'
    - '+.mzstatic.com'
    # 本地 / 私有 / 连通性检测
    - '+.local'
    - 'geosite:private'
    - 'geosite:connectivity-check'
    - 'msftconnecttest.com'
    # 时间同步
    - 'time.*.com'
    - '+.ntp.org'
    - 'geosite:category-ntp'
    # 微信 / QQ / 腾讯
    - '+.weixin.qq.com'
    - '+.wx.qq.com'
    - '+.wechat.com'
    - '+.mmobject.com'
    - '+.mmfile.com'
    - '+.qpic.cn'
    - '+.qlogo.cn'
    - '+.qq.com'
    - '+.tencent.com'
    - '+.tencent.cn'
    # Tailscale
    - '*.ts.net'
    - '*.tailscale.com'
    - '*.tailscale.io'
    # STUN / WebRTC
    - '+.stun.*.*'
    - 'stun.*.*'




