# ipv6: false                        # 全局关闭 IPv6，防 IPv6 真实 IP 泄露
# udp: false                         # 全局关闭 UDP，hy2/TUIC 节点在 proxy 里局部 udp: true
# prefer-h3: false                   # 关闭 HTTP/3 (QUIC)，强制走 TCP

