# ================================================================
# Rules
# ================================================================
rules:
  # ── 本地/私有 ──
  - IP-CIDR6,::/0,REJECT,no-resolve
  - RULE-SET,private,DIRECT
  - RULE-SET,bypass,DIRECT
  - RULE-SET,auto-proxy,🌐 节点选择
  - RULE-SET,tailscale,DIRECT

  # ── 屏蔽 ──
  # # 提前，避免被 CN/MATCH 兜底
  - RULE-SET,adblock-lite,REJECT
  - RULE-SET,秋风广告规则,REJECT
  - RULE-SET,doubaoime-block,REJECT
  - RULE-SET,apple-ota,REJECT
   # 全局拦 QUIC，后面不用重复
  - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT

  # ── 进程规则（macOS only）──
  - PROCESS-NAME,WeChat,DIRECT
  - PROCESS-NAME,Claude Helper,🪬 Claude专用
  - PROCESS-NAME,Claude Helper (Renderer),🪬 Claude专用
  - PROCESS-NAME,Claude,🪬 Claude专用
  - PROCESS-NAME,Antigravity Helper,🗽 美国出口
  - PROCESS-NAME,Antigravity Helper (Renderer),🗽 美国出口

  # ── Emby ──
  - RULE-SET,emby-direct,DIRECT
  - RULE-SET,emby-proxy,Emby-观影代理

  # ── Apple ──
  - RULE-SET,apns,🌐 节点选择
  - RULE-SET,apple-music,🌐 节点选择
  - RULE-SET,apple-tv,🌐 节点选择
  - RULE-SET,apple-proxy,🌐 节点选择
  - RULE-SET,apple-id,🌐 节点选择
  - RULE-SET,apple-store,🌐 节点选择
  - RULE-SET,apple,🌐 节点选择            # 兜底 Apple，放最后

  # ── 流媒体 ──
  - RULE-SET,youtube-music,油管
  - RULE-SET,youtube,油管
  - RULE-SET,twitter-video,油管

  # ── AI ──
  - RULE-SET,claude-pro,🪬 Claude专用
  - RULE-SET,claude,🪬 Claude专用
  - RULE-SET,anthropic,🪬 Claude专用
  - RULE-SET,openai,AI双链路
  - RULE-SET,gemini-plus,AI双链路
  - RULE-SET,gemini,AI双链路
  - RULE-SET,copilot,AI双链路
  - DOMAIN-SUFFIX,nel.goog,AI双链路
  - RULE-SET,google,AI双链路

  # ── 社交媒体 ──
  - RULE-SET,twitter,社交媒体
  - RULE-SET,telegram,TikTok媒体
  - RULE-SET,Tiktok,TikTok媒体
  - RULE-SET,linkedin,社交媒体

  # --- 流媒体 ---
  - RULE-SET,Netflix,流媒体
  - RULE-SET,HBO,流媒体
  - RULE-SET,Disney,流媒体
  - RULE-SET,AppleTV,流媒体
  - RULE-SET,Spotify,Spotify-音乐

  # ── 开发工具 ──
  - RULE-SET,github,♻️ 自动选择
  - RULE-SET,microsoft,♻️ 自动选择
  - RULE-SET,docker,♻️ 自动选择

  # ── 自定义域名 ──
  - DOMAIN-SUFFIX,ipleak.net,🗽 美国出口
  - DOMAIN-SUFFIX,dnsleaktest.com,🗽 美国出口
  - DOMAIN-SUFFIX,ipapi.co,🗽 美国出口
  - DOMAIN-SUFFIX,ugtop.com,🗼 日本出口
  - DOMAIN-SUFFIX,antigravity-unleash.goog,🗽 美国出口

  # ── 兜底 ──
  - GEOIP,CN,DIRECT,no-resolve
  - GEOIP,LAN,DIRECT,no-resolve

  - MATCH,🌐 节点选择
