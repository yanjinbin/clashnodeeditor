name: Deploy to Production

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel (production)
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_vSi0ooGXG4IiO9BnZy8LwaOj
          VERCEL_PROJECT_ID: prj_EUw3Yq3owWL0okMi1Sj4fSZz27jx
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          VERCEL_GIT_COMMIT_REF: ${{ github.ref_name }}
          VERCEL_GIT_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          VERCEL_GIT_COMMIT_AUTHOR_LOGIN: ${{ github.actor }}
          VERCEL_GIT_REPO_OWNER: ${{ github.repository_owner }}
          VERCEL_GIT_REPO_SLUG: ${{ github.event.repository.name }}
